name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Cache Gradle & Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/*.gradle', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Rename Debug APK
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/DeepSeek-Reasonix-android.apk

      - name: Rename Release APK
        run: mv app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/DeepSeek-Reasonix-android-unsigned.apk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: DeepSeek-Reasonix-android
          path: app/build/outputs/apk/debug/DeepSeek-Reasonix-android.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: DeepSeek-Reasonix-android-unsigned
          path: app/build/outputs/apk/release/DeepSeek-Reasonix-android-unsigned.apk

      - name: Upload Build Reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            app/build/reports/
            **/build/reports/
